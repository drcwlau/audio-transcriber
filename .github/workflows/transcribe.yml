name: Transcribe Audio File

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    paths:
      - '*.mp3'
      - '*.m4a'
      - '*.wav'

jobs:
  transcribe:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache Whisper models
      uses: actions/cache@v3
      with:
        path: ~/.cache/whisper
        key: whisper-models-${{ runner.os }}
        restore-keys: whisper-models-
    
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y ffmpeg
    
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    
    - name: Find and transcribe audio files
      run: |
        for file in *.mp3 *.m4a *.wav; do
          if [ -f "$file" ]; then
            echo "=========================================="
            echo "Transcribing: $file"
            echo "=========================================="
            python transcriber.py "$file"
          fi
        done
    
    - name: Upload transcripts as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: transcripts
        path: '*_transcript.txt'
        if-no-files-found: ignore
    
    - name: Commit and push transcripts
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull --rebase origin main || true
        git add *_transcript.txt 2>/dev/null || true
        git add *.txt 2>/dev/null || true
        
        if [ -n "$(git status --porcelain)" ]; then
          echo "Committing transcripts..."
          git commit -m "Add audio transcripts - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "✅ Push successful"
        else
          echo "ℹ️  No transcripts to commit"
        fi
