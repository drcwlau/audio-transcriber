name: Transcribe Audio File

on:
  workflow_dispatch:
  push:
    paths:
      - '*.mp3'
      - '*.m4a'
      - '*.wav'

jobs:
  transcribe:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y ffmpeg portaudio19-dev
    
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    
    - name: Find and transcribe audio file
      run: |
        for file in *.mp3 *.m4a *.wav; do
          if [ -f "$file" ]; then
            echo "Transcribing: $file"
            python transcriber.py "$file" -o "${file%.*}_transcript.txt"
          fi
        done
    
    - name: Upload transcript
      uses: actions/upload-artifact@v4
      with:
        name: transcripts
        path: '*_transcript.txt'
    
    - name: Commit transcript
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *_transcript.txt || true
        git commit -m "Add transcript for audio file" || echo "No changes to commit"
        git push || echo "Nothing to push"
